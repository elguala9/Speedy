name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: ".exe"
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: ""
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux GUI dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libwayland-dev libxrandr-dev libxi-dev \
            libxcursor-dev libxinerama-dev libgtk-3-dev libglib2.0-dev \
            libxdo-dev

      - name: Build all binaries (Linux/Windows with GUI)
        if: matrix.os != 'macos-latest'
        run: cargo build --release -p speedy-ai-context -p speedy-daemon -p speedy-cli -p speedy-mcp -p speedy-gui -p speedy-language-context --target ${{ matrix.target }}

      - name: Build all binaries (macOS, no GUI)
        if: matrix.os == 'macos-latest'
        run: cargo build --release -p speedy-ai-context -p speedy-daemon -p speedy-cli -p speedy-mcp -p speedy-language-context --target ${{ matrix.target }}

      - name: Package (Linux/Windows with GUI)
        if: matrix.os != 'macos-latest'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf speedy-${{ matrix.target }}.tar.gz \
            speedy-ai-context${{ matrix.suffix }} \
            speedy-daemon${{ matrix.suffix }} \
            speedy-cli${{ matrix.suffix }} \
            speedy-mcp${{ matrix.suffix }} \
            speedy-gui${{ matrix.suffix }} \
            speedy-language-context${{ matrix.suffix }}
          mv speedy-${{ matrix.target }}.tar.gz ../../../

      - name: Package (macOS, no GUI)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf speedy-${{ matrix.target }}.tar.gz \
            speedy-ai-context${{ matrix.suffix }} \
            speedy-daemon${{ matrix.suffix }} \
            speedy-cli${{ matrix.suffix }} \
            speedy-mcp${{ matrix.suffix }} \
            speedy-language-context${{ matrix.suffix }}
          mv speedy-${{ matrix.target }}.tar.gz ../../../

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: speedy-*.tar.gz
          generate_release_notes: true
