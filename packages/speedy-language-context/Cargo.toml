[package]
name = "speedy-language-context"
description = "Local open-source code intelligence — symbol graph + MCP server"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
readme.workspace = true
authors.workspace = true
categories = ["development-tools", "command-line-utilities"]
keywords = ["mcp", "code-intelligence", "tree-sitter", "symbol-graph", "ai"]

[[bin]]
name = "speedy-language-context"
path = "src/main.rs"

[lib]
name = "speedy_language_context"
path = "src/lib.rs"

[dependencies]
speedy-core = { path = "../speedy-core" }
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
rusqlite = { version = "0.31", features = ["bundled"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
ignore = "0.4"
blake3 = "1"
toml = "0.8"
tree-sitter = "0.25"
tree-sitter-rust = "0.23"
tree-sitter-javascript = "0.23"
tree-sitter-typescript = "0.23"
tree-sitter-python = "0.23"
tree-sitter-go = "0.23"
tree-sitter-c = "0.23"
tree-sitter-cpp = "0.23"
tree-sitter-java = "0.23"
tree-sitter-c-sharp = "0.23"
tree-sitter-ruby = "0.23"
tree-sitter-php = "0.23"
tree-sitter-swift = "0.7"
tree-sitter-scala = "0.26"

[dev-dependencies]
tempfile = "3"
