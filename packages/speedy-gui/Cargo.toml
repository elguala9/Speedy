[package]
name = "speedy-gui"
description = "Local Semantic File System - Desktop GUI"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
readme.workspace = true
authors.workspace = true
categories = ["development-tools", "gui"]
keywords = ["semantic-search", "daemon", "gui", "egui"]

[[bin]]
name = "speedy-gui"
path = "src/main.rs"

[dependencies]
speedy-core = { path = "../speedy-core" }
eframe = { version = "0.28", default-features = false, features = ["default_fonts", "glow", "persistence"] }
egui = "0.28"
egui_extras = { version = "0.28", features = ["all_loaders"] }
tokio = { version = "1", features = ["full"] }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
dirs = "5"
rfd = "0.14"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tray-icon = "0.19"
notify-rust = "4.11"

[target.'cfg(windows)'.dependencies]
winreg = "0.52"
