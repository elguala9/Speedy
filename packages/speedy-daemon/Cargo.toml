[package]
name = "speedy-daemon"
version = "0.1.0"
edition = "2021"
description = "Local Semantic File System - Central Daemon"

[[bin]]
name = "speedy-daemon"
path = "src/main.rs"

[dependencies]
speedy-core = { path = "../speedy-core" }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
clap = { version = "4", features = ["derive"] }
notify = { version = "6.1", features = ["macos_kqueue"] }
notify-debouncer-mini = "0.4"
dirs = "5"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
