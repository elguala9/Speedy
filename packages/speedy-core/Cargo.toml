[package]
name = "speedy-core"
version = "0.1.0"
edition = "2021"
description = "Local Semantic File System - shared library"

[lib]
name = "speedy_core"
path = "src/lib.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
dirs = "5"
