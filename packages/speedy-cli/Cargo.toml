[package]
name = "speedy-cli"
version = "0.1.0"
edition = "2021"
description = "Local Semantic File System - Thin CLI Client"

[[bin]]
name = "speedy-cli"
path = "src/main.rs"

[dependencies]
speedy-core = { path = "../speedy-core" }
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
